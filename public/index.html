<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Legacy Football Manager 07/08</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Mobile Legacy Manager</p>
          <h1>Season 2007/08</h1>
        </div>
        <button id="refreshButton" class="ghost-button" type="button">Refresh</button>
      </header>

      <main id="app" class="app-content">
        <section class="loading-card">
          <p>Loading legacy database and squads...</p>
        </section>
      </main>

      <nav id="bottomNav" class="bottom-nav hidden">
        <button data-tab="dashboard" class="active">Club</button>
        <button data-tab="squad">Squad</button>
        <button data-tab="transfers">Market</button>
        <button data-tab="finance">Finance</button>
        <button data-tab="season">Season</button>
        <button data-tab="match">Match</button>
      </nav>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="/app.js"></script>
  </body>
</html>
